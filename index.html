<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: bw-texture:; connect-src 'self' ws: wss:"
    />
    <title>Blockwright</title>
    <style>
      /* Boot splash — shown until React mounts (createRoot replaces #app's content),
         so the window never appears empty. Opaque background covers the translucent
         vibrancy window with a solid loading screen; follows the OS appearance. */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        /* Must match --bg in index.css (light / dark) so the splash and the app
           share one background — no jump when React mounts. */
        background: #f5f6f8;
      }
      @media (prefers-color-scheme: dark) {
        #boot { background: #1a1d23; }
      }
      #boot img {
        width: 76px;
        height: 76px;
        border-radius: 19px;
        filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.3));
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      #boot .boot-spinner {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2.5px solid rgba(128, 128, 140, 0.25);
        border-top-color: #4c8dff;
        animation: boot-spin 0.7s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @keyframes boot-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.78; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot" aria-hidden="true">
        <picture>
          <source media="(prefers-color-scheme: dark)" srcset="logo-dark.png" />
          <img src="logo-light.png" alt="Blockwright" />
        </picture>
        <div class="boot-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
