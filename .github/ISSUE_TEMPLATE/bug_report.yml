name: Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Blockwright version
      description: See Settings ▸ About (or the release you downloaded).
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Logs (View ▸ Console), screenshots, the .nbt file, or other context.
    validations:
      required: false
