name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # commitlint needs the full history to lint a range of commits.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # On PRs, lint every commit between the base and the PR head.
      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      # On pushes to main, lint the commits introduced by the push. The first
      # push to a ref reports an all-zeros "before" SHA, so fall back to the
      # parent of the pushed tip in that case.
      - name: Lint pushed commits
        if: github.event_name == 'push'
        run: |
          from="${{ github.event.before }}"
          if [ "$from" = "0000000000000000000000000000000000000000" ]; then
            from="${{ github.event.after }}~1"
          fi
          npx commitlint --from "$from" --to "${{ github.event.after }}" --verbose
